name: GP PRO AGENT v2 Build
on:
  push:
    branches: [ main ]
jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install all dependencies
      run: |
        pip install pyinstaller psutil
        pip install llama-cpp-python --prefer-binary
        pip install pyautogui Pillow onnxruntime
        pip install pyttsx3 SpeechRecognition
        pip install pytesseract
    - name: Build
      run: |
        pyinstaller --onedir --windowed --name GP_PRO_AGENT `
          --add-data "gui;gui" `
          --add-data "config;config" `
          --add-data "modules;modules" `
          --hidden-import tkinter `
          --hidden-import tkinter.ttk `
          --hidden-import tkinter.scrolledtext `
          --hidden-import tkinter.messagebox `
          --hidden-import llama_cpp `
          --hidden-import psutil `
          --hidden-import pyttsx3 `
          --hidden-import speech_recognition `
          --hidden-import PIL `
          --collect-all llama_cpp `
          --collect-all pyttsx3 `
          main.py
        copy README.md dist\GP_PRO_AGENT\
        Compress-Archive -Path dist\GP_PRO_AGENT -DestinationPath GP_PRO_AGENT-Windows.zip
    - uses: actions/upload-artifact@v4
      with:
        name: GP_PRO_AGENT-Windows
        path: GP_PRO_AGENT-Windows.zip
  release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: GP_PRO_AGENT-Windows
    - name: Release
      run: |
        gh release delete latest --yes 2>/dev/null || true
        git push --delete origin latest 2>/dev/null || true
        gh release create latest \
          --title "GP PRO AGENT v2.0 — All 6 Modules" \
          --notes "Voice | Vision | Memory | PLC Control | Dashboard | Scheduler | Real AI" \
          GP_PRO_AGENT-Windows.zip
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
