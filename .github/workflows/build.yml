name: GP PRO AGENT Build
on:
  push:
    branches: [ main ]
jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Build
      run: |
        pip install pyinstaller psutil
        pyinstaller --onedir --windowed --name GP_PRO_AGENT --add-data "gui;gui" --add-data "config;config" --hidden-import tkinter --hidden-import tkinter.ttk --hidden-import tkinter.scrolledtext --hidden-import tkinter.messagebox main.py
        copy README.md dist\GP_PRO_AGENT\
        Compress-Archive -Path dist\GP_PRO_AGENT -DestinationPath GP_PRO_AGENT-Windows.zip
    - uses: actions/upload-artifact@v4
      with:
        name: GP_PRO_AGENT-Windows
        path: GP_PRO_AGENT-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Build
      run: |
        sudo apt-get install -y python3-tk
        pip install pyinstaller psutil
        pyinstaller --onedir --windowed --name GP_PRO_AGENT --add-data "gui:gui" --add-data "config:config" --hidden-import tkinter --hidden-import tkinter.ttk main.py
        cp README.md dist/GP_PRO_AGENT/
        tar -czf GP_PRO_AGENT-Linux.tar.gz -C dist GP_PRO_AGENT
    - uses: actions/upload-artifact@v4
      with:
        name: GP_PRO_AGENT-Linux
        path: GP_PRO_AGENT-Linux.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: GP_PRO_AGENT-Windows
    - uses: actions/download-artifact@v4
      with:
        name: GP_PRO_AGENT-Linux
    - name: Release
      run: |
        gh release delete latest --yes 2>/dev/null || true
        git push --delete origin latest 2>/dev/null || true
        gh release create latest --title "GP PRO AGENT v1.0.0" --notes "Professional AI — 11 Brains — 40GB — Double click to install" GP_PRO_AGENT-Windows.zip GP_PRO_AGENT-Linux.tar.gz
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
